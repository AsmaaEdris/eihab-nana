<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Wedding Dashboard | Ehab & Nana ✨
    </title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet"
    >

  <style>
    :root {
        --gold: #c5a880;
        --dark: #2c261f;
        /* خلفية تدرج لوني ناعم */
        --bg-gradient: linear-gradient(135deg, #fdfbf7 0%, #ede6db 100%);
    }

    body {
        background: var(--bg-gradient);
        min-height: 100vh;
        color: var(--dark);
        font-family: 'Inter', sans-serif;
        margin: 0;
        padding: 20px;
    }

    .container {
        max-width: 1000px;
        margin: 0 auto;
    }

    header {
        text-align: center;
        margin: 40px 0;
    }

    /* ديزاين الاسم المتدرج */
    h1 {
        font-family: 'Playfair Display', serif;
        background: linear-gradient(to right, #a17a4b, #c5a880, #a17a4b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 3.5rem;
        margin-bottom: 10px;
        letter-spacing: 1px;
    }

    /* ديزاين الكروت الزجاجية */
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-bottom: 40px;
    }

    .stat-card {
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(10px);
        padding: 25px;
        border-radius: 20px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow: 0 8px 32px rgba(0,0,0,0.05);
    }

    .number {
        font-size: 2rem;
        font-weight: 700;
        color: var(--gold);
        display: block;
        margin-top: 5px;
    }

    /* تنسيق الجدول */
    table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0 10px;
    }

    th {
        color: #888;
        text-transform: uppercase;
        font-size: 0.75rem;
        padding: 15px;
        text-align: left;
    }

    tr {
        background: rgba(255, 255, 255, 0.8);
        border-radius: 15px;
        transition: .3s;
    }

    tr:hover {
        background: rgba(255, 255, 255, 1);
        transform: scale(1.01);
    }

    td {
        padding: 20px;
        border-bottom: none;
    }

    .badge {
        padding: 6px 15px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 600;
    }

    .success { background: #dcfce7; color: #166534; }
    .danger { background: #fee2e2; color: #b91c1c; }

    .btn-del {
        cursor: pointer;
        color: #bc0909;
        border: none;
        background: none;
        font-size: 1.2rem;
        transition: .3s;
    }

    .btn-del:hover { transform: scale(1.2); }

    /* تنسيق الهاتف */
    @media (max-width: 768px) {
        .stats-grid { grid-template-columns: repeat(2, 1fr); }
        h1 { font-size: 2.2rem; }
    }
</style>
</head>

<body>

<div class="container">

    <header>

        <h1>
            Ehab & Nana
        </h1>

        <p>
            Wedding Attendance Overview
        </p>

    </header>

    <div class="stats-grid">

        <div class="stat-card">

            <h3>Total</h3>

            <span
                class="number"
                id="t-total"
            >
                0
            </span>

        </div>

        <div class="stat-card">

            <h3>Attending</h3>

            <span
                class="number"
                id="t-attending"
            >
                0
            </span>

        </div>

        <div class="stat-card">

            <h3>Declined</h3>

            <span
                class="number"
                id="t-declined"
            >
                0
            </span>

        </div>

        <div class="stat-card">

            <h3>Notes</h3>

            <span
                class="number"
                id="t-notes"
            >
                0
            </span>

        </div>

    </div>

    <div class="table-container">

        <table>

            <thead>

            <tr>

                <th>Guest Name</th>

                <th>Status</th>

                <th>Count</th>

                <th>Message</th>

                <th>Action</th>

            </tr>

            </thead>

            <tbody id="tableBody"></tbody>

        </table>

    </div>

</div>

<script>

async function init() {

    const res =
        await fetch('/api/guests');

    const data =
        await res.json();

    const tbody =
        document.getElementById(
            'tableBody'
        );

    let total = 0;

    let attending = 0;

    let declined = 0;

    let notes = 0;

    tbody.innerHTML = '';

    data.forEach((g) => {

        const isAttending =

            g.status === 'حضور' ||

            g.status === 'Attending' ||

            g.status === true ||

            g.status === 'true';

        const count = isAttending

            ? Math.max(
                1,
                parseInt(g.guestsCount) || 1
              )

            : 0;

        if (isAttending) {

            attending++;

            total += count;

        } else {

            declined++;

        }

        if (

            g.message &&

            g.message.trim() !== ''

        ) {

            notes++;

        }

        tbody.innerHTML += `

            <tr>

                <td data-label=" Name">

                    <strong>

                        ${escapeHtml(g.name)}

                    </strong>

                </td>

                <td data-label="Status">

                    <span class="badge ${
                        isAttending
                            ? 'success'
                            : 'danger'
                    }">

                        ${
                            isAttending
                                ? 'Attending'
                                : 'Declined'
                        }

                    </span>

                </td>

                <td data-label="Count">

                    ${
                        isAttending
                            ? count
                            : '-'
                    }

                </td>

                <td data-label="Message">

                    ${
                        escapeHtml(
                            g.message || '-'
                        )
                    }

                </td>

                <td data-label="Action">

                    <button
                        class="btn-del"
                        onclick="del(${g.id}, this)"
                    >
                        ✕
                    </button>

                </td>

            </tr>

        `;
    });

    document
        .getElementById('t-total')
        .textContent = total;

    document
        .getElementById('t-attending')
        .textContent = attending;

    document
        .getElementById('t-declined')
        .textContent = declined;

    document
        .getElementById('t-notes')
        .textContent = notes;
}

async function del(id, buttonElement) {

    const row =
        buttonElement.closest('tr');

    row.style.opacity = '.3';

    try {

        const res =
            await fetch(
                `/api/delete?id=${id}`,
                {
                    method: 'DELETE'
                }
            );

        const data =
            await res.json();

        if (data.success) {

            row.style.transform =
                'scale(.95)';

            row.style.opacity =
                '0';

            setTimeout(() => {

                row.remove();

                updateStats();

            }, 300);

        } else {

            row.style.opacity = '1';

            alert('Delete failed');

        }

    } catch (err) {

        console.error(err);

        row.style.opacity = '1';

    }
}

function updateStats() {

    const rows =
        document.querySelectorAll(
            '#tableBody tr'
        );

    let total = 0;

    let attending = 0;

    let declined = 0;

    let notes = 0;

    rows.forEach(row => {

        const status =
            row.querySelector('.badge')
            .textContent
            .trim();

        const count =
            parseInt(
                row.children[2]
                .textContent
            ) || 0;

        const message =
            row.children[3]
            .textContent
            .trim();

        if (

            status === 'حضور'

        ) {

            attending++;

            total += count;

        } else {

            declined++;

        }

        if (
            message &&
            message !== '-'
        ) {

            notes++;

        }

    });

    document
        .getElementById('t-total')
        .textContent = total;

    document
        .getElementById('t-attending')
        .textContent = attending;

    document
        .getElementById('t-declined')
        .textContent = declined;

    document
        .getElementById('t-notes')
        .textContent = notes;
}

function escapeHtml(str) {

    if (!str) return '';

    return str

        .replace(/&/g, "&amp;")

        .replace(/</g, "&lt;")

        .replace(/>/g, "&gt;")

        .replace(/"/g, "&quot;")

        .replace(/'/g, "&#039;");
}

init();

</script>

</body>
</html>
